<ul style="list-style: none; padding: 0;">
{{ range site.Data.roadmap.items }}
  <li style="margin-bottom: 1rem; padding: 1rem; background: rgba(255,255,255,0.05); border-radius: 8px; border-left: 4px solid {{ if .completed }}#4ade80{{ else }}#d4a574{{ end }};">
    <strong>{{ .phase }}</strong> 
    {{ if .completed }}<span style="color: #4ade80; font-size: 0.9em; margin-left: 0.5rem;">(Completed)</span>{{ else }}<span style="color: #d4a574; font-size: 0.9em; margin-left: 0.5rem;">(In Progress / Planned)</span>{{ end }}
    <p style="margin-top: 0.5rem; margin-bottom: 0;">{{ .description }}</p>
  </li>
{{ end }}
</ul>
